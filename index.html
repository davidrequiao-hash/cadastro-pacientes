<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Pacientes</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h2>Cadastro de Pacientes</h2>
  <form id="formPaciente">
    <input type="hidden" id="pacienteId"> <input type="text" id="nome" placeholder="Nome" required>
    <input type="text" id="celular" placeholder="Celular" required>
    <input type="email" id="email" placeholder="Email" required>
    <button type="submit" id="btnSalvar">Cadastrar</button>
    <button type="button" id="btnCancelar" style="display: none;">Cancelar</button>
  </form>

  <hr>
  <h3>Lista de Pacientes</h3>
  <div id="listaPacientes"></div>

  <script type="module" src="script.js"></script>
</body>
</html>
